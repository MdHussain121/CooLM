<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CooLM - Rooftop Pigeon AI</title>
    <meta name="description" content="CooLM: A 42M parameter tiny language model that talks like a rooftop pigeon. Runs completely locally in your browser using ONNX.">
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --chat-bg: rgba(22, 26, 37, 0.65);
            --primary: #e06d6d; /* Warm glowing red/pink */
            --primary-hover: #f18282;
            --text-dark: #f0f2f5;
            --text-light: #94a3b8;
            --user-bubble: linear-gradient(135deg, #38bdf8, #0284c7); /* Sky blue gradient */
            --coo-bubble: rgba(255, 255, 255, 0.05);
            --coo-border: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --glow: 0 0 15px rgba(224, 109, 109, 0.4);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(224, 109, 109, 0.08) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(56, 189, 248, 0.06) 0px, transparent 50%),
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'><path d='M15 25 a4 4 0 0 1 4-4 a6 6 0 0 1 8 2 a4 4 0 0 1 4 3 a4 4 0 0 1 -3 4 h -10 a3 3 0 0 1 -3 -5 z' fill='%23ffffff' fill-opacity='0.02'/><path d='M55 45 c3-3 7-1 10 1 c1 1 3 0 4-1 c1-1 2-1 3 0 c0 1 0 2-1 3 c-2 2 -4 2 -6 0 c-1 1 -3 3 -3 5 h-5 c0-2 -1-4 -3-5 c-1-1 -3-2 -3-3 c0-1 1-2 3-2 z' fill='%23ffffff' fill-opacity='0.02'/><path d='M25 85 c3-3 10-6 16-3 c-3 3 -6 10 -16 3 z' fill='%23ffffff' fill-opacity='0.02'/><path d='M85 95 c1-2 4-2 5 0 c-1 2 -4 2 -5 0 z' fill='%23ffffff' fill-opacity='0.02'/><path d='M95 25 l10 8 l10 -8' stroke='%23ffffff' stroke-width='1.2' fill='none' stroke-opacity='0.02'/><circle cx='15' cy='95' r='1.5' fill='%23ffffff' fill-opacity='0.02'/><circle cx='105' cy='65' r='1' fill='%23ffffff' fill-opacity='0.02'/><circle cx='65' cy='15' r='1' fill='%23ffffff' fill-opacity='0.02'/></svg>");
            background-repeat: repeat;
            color: var(--text-dark);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--chat-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 92vh;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
        }

        header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            background-color: rgba(17, 20, 28, 0.4);
            z-index: 10;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        header img.logo {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: var(--glow);
            animation: pulseGlow 3s infinite ease-in-out;
        }

        header h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 60%, #e06d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            margin: 4px 0 0;
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 400;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
            animation: blinker 1.5s infinite;
        }

        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: rgba(11, 12, 16, 0.15);
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.98rem;
            line-height: 1.45;
            animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: #ffffff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
        }

        .message.coo {
            align-self: flex-start;
            background-color: var(--coo-bubble);
            border: 1px solid var(--coo-border);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }

        .system-msg {
            align-self: center;
            font-size: 0.8rem;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 20px;
            text-align: center;
        }

        /* Sidebars for desktop floating suggestions */
        .suggestions-sidebar {
            position: absolute;
            top: 0;
            bottom: 0;
            width: calc(50vw - 360px);
            max-width: 300px;
            overflow: hidden;
            pointer-events: none;
            z-index: 10;
        }

        .suggestions-sidebar.left {
            left: 20px;
        }

        .suggestions-sidebar.right {
            right: 20px;
        }

        .floating-pill {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(22, 26, 37, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            color: #cbd5e1;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            /* No transform transitions to prevent physics conflict */
            transition: opacity 0.5s ease-in-out, background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            opacity: 0;
        }

        .floating-pill.visible {
            opacity: 1;
        }

        .floating-pill:hover {
            background: rgba(224, 109, 109, 0.15);
            border-color: var(--primary);
            color: #ffffff;
            box-shadow: 0 6px 18px rgba(224, 109, 109, 0.35);
        }

        /* Mobile fallback suggestions (inside the chat card) */
        .mobile-suggestions {
            display: none;
            padding: 0 24px 12px;
            flex-direction: column;
            gap: 8px;
        }

        .suggestions-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-light);
            font-weight: 600;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 105px;
            overflow-y: auto;
            padding-bottom: 4px;
        }

        .suggestions::-webkit-scrollbar {
            width: 4px;
        }

        .suggestions::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .suggestion-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: #cbd5e1;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.78rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .suggestion-pill:hover {
            background: rgba(224, 109, 109, 0.15);
            border-color: var(--primary);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(224, 109, 109, 0.1);
        }

        @media (max-width: 1050px) {
            .mobile-suggestions {
                display: flex;
            }
            .suggestions-sidebar {
                display: none;
            }
        }

        .input-area {
            display: flex;
            padding: 20px 24px 24px;
            border-top: 1px solid var(--border);
            background: rgba(17, 20, 28, 0.4);
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .input-area input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(11, 12, 16, 0.3);
            border: 1px solid var(--border);
            border-radius: 28px;
            font-size: 0.95rem;
            color: #ffffff;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .input-area input:focus {
            border-color: var(--primary);
            background: rgba(11, 12, 16, 0.5);
            box-shadow: 0 0 0 3px rgba(224, 109, 109, 0.15);
        }

        .input-area button {
            background: linear-gradient(135deg, var(--primary), #c95151);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 28px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--glow);
            font-family: inherit;
        }

        .input-area button:hover {
            background: linear-gradient(135deg, var(--primary-hover), #d46a6a);
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(224, 109, 109, 0.6);
        }

        .input-area button:active {
            transform: translateY(1px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(224, 109, 109, 0.3); border-color: var(--primary); }
            50% { box-shadow: 0 0 22px rgba(224, 109, 109, 0.75); border-color: #ff9191; }
        }

        @keyframes blinker {
            50% { opacity: 0.4; }
        }

        /* Loading Dots styling */
        .typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 16px 20px !important;
        }

        .typing .dot {
            width: 7px;
            height: 7px;
            background: var(--text-light);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes blink {
            0% { opacity: 0.2; transform: scale(0.9); }
            20% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.2; transform: scale(0.9); }
        }
    </style>
</head>
<body>
    <div class="suggestions-sidebar left" id="suggestionsLeft"></div>
    <div class="suggestions-sidebar right" id="suggestionsRight"></div>

    <div class="container">
        <header>
            <div class="header-content">
                <div class="brand">
                    <img src="assets/coolm.png" alt="CooLM Logo" class="logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'54\' height=\'54\'><rect width=\'54\' height=\'54\' fill=\'%23d46a6a\'/><text x=\'50%\' y=\'50%\' fill=\'white\' font-size=\'22\' font-weight=\'bold\' font-family=\'sans-serif\' text-anchor=\'middle\' dy=\'.3em\'>C</text></svg>'">
                    <div>
                        <h1>CooLM</h1>
                        <p>A ~42M parameter rooftop pigeon LLM running locally via ONNX.</p>
                    </div>
                </div>
                <div class="server-status">
                    <span class="status-dot"></span>
                    <span>Active Engine</span>
                </div>
            </div>
        </header>

        <div class="chat-box" id="chatBox">
            <div class="message system-msg">
                Model running locally via Python server (ONNX Inference).
            </div>
            <div class="message coo">
                coo. i am a pigeon on a roof. what do you want.
            </div>
        </div>

        <div class="mobile-suggestions">
            <div class="suggestions-label">Try asking coo</div>
            <div class="suggestions" id="mobileSuggestionsList">
                <!-- Populated dynamically via JS -->
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Say something to Coo..." autocomplete="off" onkeypress="handleKeyPress(event)">
            </div>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message coo typing';
            div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function triggerInference(text, typingIndicator) {
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                if (!response.ok) {
                    throw new Error("Server response wasn't OK");
                }
                
                const data = await response.json();
                chatBox.removeChild(typingIndicator);
                addMessage(data.response, 'coo');
            } catch (e) {
                chatBox.removeChild(typingIndicator);
                addMessage("coo (error): " + e.message + ". Make sure you started the local server using chat.bat!", 'coo');
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            
            const typingIndicator = showTyping();
            await triggerInference(text, typingIndicator);
        }

        async function sendSuggestion(text) {
            addMessage(text, 'user');
            const typingIndicator = showTyping();
            await triggerInference(text, typingIndicator);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        const ALL_PROMPTS = [
            "why do humans honk so much",
            "is the street cat still prowling",
            "where do you find sunflower seeds",
            "tell me about the hot sun",
            "are green parrots noisy",
            "where is your favorite perch",
            "are you afraid of eagles",
            "what is in the garbage bin",
            "can we share some bread crumbs",
            "is the street dog friendly",
            "tell me about your cozy nest",
            "why do you fly at sunset",
            "did it rain today",
            "why do monkeys steal food",
            "how do you dry your feathers",
            "is the cement hot on your feet",
            "tell me a story about a crow",
            "where is the tallest building",
            "do you like the monsoon rain",
            "why are rickshaws so loud",
            "can you see the whole city from up there",
            "where do you go when it storms",
            "have you met the local sparrow flock",
            "what does bread taste like",
            "is it safe to sit on wires"
        ];

        function displayFloatingPrompts() {
            const leftSidebar = document.getElementById('suggestionsLeft');
            const rightSidebar = document.getElementById('suggestionsRight');
            const mobileContainer = document.getElementById('mobileSuggestionsList');
            
            if (!leftSidebar || !rightSidebar) return;
            
            // Staggered fade out of old pills
            const oldPills = [...floatingPills];
            floatingPills = []; // clear the physics array
            
            oldPills.forEach(pillObj => {
                pillObj.element.classList.remove('visible');
                setTimeout(() => {
                    pillObj.element.remove();
                }, 500);
            });
            
            // Shuffle the prompts array
            const shuffled = [...ALL_PROMPTS].sort(() => 0.5 - Math.random());
            
            // Desktop: Select 4 for left, 4 for right
            const leftSelection = shuffled.slice(0, 4);
            const rightSelection = shuffled.slice(4, 8);
            
            // Mobile: Select 3 for mobile scroll
            const mobileSelection = shuffled.slice(8, 11);
            
            // Staggered render to look elegant
            leftSelection.forEach((prompt, idx) => {
                createFloatingPill(prompt, leftSidebar, 'left', idx);
            });
            
            rightSelection.forEach((prompt, idx) => {
                createFloatingPill(prompt, rightSidebar, 'right', idx);
            });
            
            // Render Mobile Inline
            if (mobileContainer) {
                mobileContainer.innerHTML = '';
                mobileSelection.forEach(prompt => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-pill';
                    div.textContent = prompt;
                    div.onclick = () => sendSuggestion(prompt);
                    mobileContainer.appendChild(div);
                });
            }
        }

        function createFloatingPill(prompt, container, side, index) {
            const pill = document.createElement('div');
            pill.className = 'floating-pill';
            pill.textContent = prompt;
            pill.onclick = () => sendSuggestion(prompt);
            
            container.appendChild(pill);
            
            // Measure actual size (or fall back to defaults)
            const w = pill.offsetWidth || 150;
            const h = pill.offsetHeight || 38;
            
            const limitX = container.clientWidth || 200;
            const limitY = container.clientHeight || 600;
            
            // Calculate a staggered Y position band to avoid initial overlap
            const bandHeight = (limitY - 150) / 4;
            const minTop = 75 + (index * bandHeight);
            const maxTop = minTop + bandHeight - h - 5;
            const startY = Math.random() * (maxTop - minTop) + minTop;
            const startX = Math.random() * (limitX - w - 10);
            
            // Random slow velocity
            const vx = (Math.random() * 0.2 + 0.15) * (Math.random() < 0.5 ? 1 : -1);
            const vy = (Math.random() * 0.2 + 0.15) * (Math.random() < 0.5 ? 1 : -1);
            
            pill.style.transform = `translate3d(${startX}px, ${startY}px, 0)`;
            
            const pillObj = {
                element: pill,
                x: startX,
                y: startY,
                vx: vx,
                vy: vy,
                w: w,
                h: h,
                sidebar: side
            };
            
            floatingPills.push(pillObj);
            
            // Trigger fade-in
            setTimeout(() => {
                pill.classList.add('visible');
            }, 100 + (index * 150));
        }

        let floatingPills = []; // array of { element, x, y, vx, vy, w, h, sidebar }

        function updatePhysics() {
            const sidebars = {
                'left': document.getElementById('suggestionsLeft'),
                'right': document.getElementById('suggestionsRight')
            };
            
            // Group active pills by sidebar
            const groups = { 'left': [], 'right': [] };
            floatingPills.forEach(pill => {
                if (pill.element.parentNode) {
                    groups[pill.sidebar].push(pill);
                }
            });

            for (let side in groups) {
                const pills = groups[side];
                const sidebar = sidebars[side];
                if (!sidebar) continue;
                
                const limitX = sidebar.clientWidth || 200;
                const limitY = sidebar.clientHeight || 600;

                // 1. Update positions and boundaries
                pills.forEach(pill => {
                    // Update dimensions if not measured yet
                    if (pill.w === 0 || pill.w === 150) {
                        pill.w = pill.element.offsetWidth || 150;
                        pill.h = pill.element.offsetHeight || 38;
                    }

                    pill.x += pill.vx;
                    pill.y += pill.vy;

                    // Bounce X
                    if (pill.x < 0) {
                        pill.x = 0;
                        pill.vx = Math.abs(pill.vx);
                    } else if (pill.x + pill.w > limitX) {
                        pill.x = limitX - pill.w;
                        pill.vx = -Math.abs(pill.vx);
                    }

                    // Bounce Y
                    if (pill.y < 40) {
                        pill.y = 40;
                        pill.vy = Math.abs(pill.vy);
                    } else if (pill.y + pill.h > limitY - 40) {
                        pill.y = limitY - 40 - pill.h;
                        pill.vy = -Math.abs(pill.vy);
                    }

                    // Apply translation
                    pill.element.style.transform = `translate3d(${pill.x}px, ${pill.y}px, 0)`;
                });

                // 2. AABB Collisions resolution
                for (let i = 0; i < pills.length; i++) {
                    for (let j = i + 1; j < pills.length; j++) {
                        const p1 = pills[i];
                        const p2 = pills[j];

                        // AABB Overlap check
                        if (p1.x < p2.x + p2.w &&
                            p1.x + p1.w > p2.x &&
                            p1.y < p2.y + p2.h &&
                            p1.y + p1.h > p2.y) {
                            
                            // Calculate overlap vector
                            const overlapX = Math.min(p1.x + p1.w, p2.x + p2.w) - Math.max(p1.x, p2.x);
                            const overlapY = Math.min(p1.y + p1.h, p2.y + p2.h) - Math.max(p1.y, p2.y);

                            if (overlapX < overlapY) {
                                // Resolve X axis
                                const push = overlapX / 2;
                                if (p1.x + p1.w / 2 < p2.x + p2.w / 2) {
                                    p1.x -= push;
                                    p2.x += push;
                                } else {
                                    p1.x += push;
                                    p2.x -= push;
                                }
                                // Elastic bounce swap
                                const temp = p1.vx;
                                p1.vx = p2.vx;
                                p2.vx = temp;
                            } else {
                                // Resolve Y axis
                                const push = overlapY / 2;
                                if (p1.y + p1.h / 2 < p2.y + p2.h / 2) {
                                    p1.y -= push;
                                    p2.y += push;
                                } else {
                                    p1.y += push;
                                    p2.y -= push;
                                }
                                // Elastic bounce swap
                                const temp = p1.vy;
                                p1.vy = p2.vy;
                                p2.vy = temp;
                            }
                        }
                    }
                }
            }

            requestAnimationFrame(updatePhysics);
        }

        // Initial render, set intervals, start physics loop
        displayFloatingPrompts();
        setInterval(displayFloatingPrompts, 30000);
        requestAnimationFrame(updatePhysics);
    </script>
</body>
</html>
